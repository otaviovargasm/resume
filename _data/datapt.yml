career-profile:
    title: Sobre mim
    summary: |
      Engenheiro de Software com mais de 14 anos de experiência em TI,
      especializado em Desenvolvimento Back-end, Sistemas Distribuídos e DevOps
      Cloud-Native. Atualmente na SAP em São Leopoldo, RS, desenvolvendo aplicações
      Java de alto desempenho com integração Kafka, deploys Kubernetes, otimização
      de latência em APIs REST e agentes de IA/LLM em escala empresarial.

      Campeão do SAP InnoWeeks 2025, conquistando 4 prêmios (Melhor Design,
      Melhor Implementação de IA, Melhor Estratégia de Projeto e Campeão Geral)
      com uma equipe multidisciplinar.

      Stack principal: Java, Spring Boot, Apache Kafka, Kubernetes, AWS (Lambda,
      S3, EKS, SQS, Cognito, CloudWatch), Docker, Terraform, PostgreSQL, MongoDB,
      Node.js e TypeScript. Reconhecido pela capacidade de resolver desafios
      complexos, mentorar colegas e implementar as melhores práticas em ambientes
      ágeis.

      Em busca de oportunidades como Engenheiro de Software Sênior para aplicar
      minha expertise em soluções cloud-native e back-end de alta escalabilidade.

