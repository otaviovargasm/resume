experiences:
    title: Experiências
    info:
      - role: Engenheiro de Software
        time: Out 2024 - Atualmente
        company: SAP, São Leopoldo, RS (Híbrido)
        details: |
          - Integrações Kafka, deploys Kubernetes e otimização de latência em APIs REST em escala SAP.
          - Observabilidade e monitoramento com Dynatrace, Grafana e Sumo Logic para acompanhamento de performance e resposta a incidentes.
          - Membro ativo dos grupos de trabalho de Qualidade e IA, promovendo inovação e melhores práticas de engenharia.
          - Liderança no desenvolvimento de uma CLI colaborativa interna na SAP, com agentes de IA para fluxos de desenvolvimento e análise de tickets, conectados a servidores MCP, integrando Claude (Anthropic), Cline e GitHub Copilot para aumentar a produtividade do time.
          - Atuação em equipes Scrum multidisciplinares com práticas de Continuous Delivery, elaboração de testes unitários, de integração e performance.
          - Campeão do SAP InnoWeeks 2025, conquistando 4 prêmios incluindo Melhor Implementação de IA e Campeão Geral.
      - role: Desenvolvedor Back-end
        time: Out 2021 - Out 2024
        company: Verzel Soluções em Sistemas, Remoto
        details: |
          - Design e manutenção de microsserviços Java escaláveis e resilientes com Spring Boot, aplicando princípios SOLID, Design Patterns e práticas de clean code.
          - Implementação de testes unitários e de integração; contribuição para monitoramento e observabilidade (Zipkin).
          - Trabalho com Apache Kafka, Kafka Streams, KSQL e Kafka Connect para processamento em tempo real e sincronização de dados.
          - Experiência com bancos relacionais (PostgreSQL, Oracle, MySQL, SQL Server) e NoSQL (MongoDB).
          - Participação em projetos Node.js com Express.js e Nest.js.
          - Colaboração em equipes ágeis (Scrum, Kanban).
          - Ampla experiência com AWS (EC2, Lambda, S3, EKS, ECS, SQS, Cognito, Secrets Manager, CloudWatch), pipelines de CI/CD (Terraform, CloudFormation, GitHub Actions, Docker, Kubernetes) e Azure DevOps.
      - role: SysAdmin
        time: Ago 2018 - Ago 2021
        company: Marinha do Brasil, Florianópolis, SC
        details: |
          - Gestão de operações de Data Center, incluindo criação e manutenção de servidores físicos e virtuais (VMware, XenServer, FreeNAS).
          - Administração de servidores de domínio, DNS, Samba 4 e aplicações web (Drupal CMS).
          - Rotinas de backup, monitoramento e gerenciamento de storages.
          - Ensino de Informática Básica para alunos da EAMSC.
          - Tecnologias: Bacula, Zabbix, Apache, PostgreSQL, MySQL, Shell Script, Oracle Linux, Ubuntu, Suse Linux.
      - role: Assistente da Divisão de Sistemas
        time: Dez 2012 - Jan 2018
        company: Marinha do Brasil, Niterói, RJ
        details: |
          - Gestão de operações de Data Center: criação e manutenção de servidores on-premises, virtualização, backup, configuração de domínio e DNS, monitoramento de servidores.
          - Tecnologias: VMware ESX, FreeNAS, DNS Server, Samba 4, Drupal CMS, Bacula, Zabbix, PostgreSQL, MySQL, Shell Script, Suse Linux, Ubuntu.
      - role: Analista de Suporte I
        time: Fev 2012 - Jul 2012
        company: Santa Casa de Juiz de Fora, MG
        details: |
          - Suporte a sistemas de faturamento de planos de saúde, elaboração de requisições no Oracle Database (PL/SQL).
          - Atendimento técnico aos usuários e manutenção de computadores.

