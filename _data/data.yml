experiences:
    title: Experience
    info:
      - role: Software Engineer
        time: Oct 2024 - Present
        company: SAP, São Leopoldo, RS (Hybrid)
        details: |
          - Design and delivery of cloud-native features and distributed systems at enterprise scale, driving end-to-end ownership of complex technical initiatives.
          - Kafka integrations, authentication and authorization controls, zero-downtime Kubernetes deployments, and REST API latency optimization at SAP scale.
          - Observability and monitoring using Dynatrace, Grafana, and Sumo Logic for performance tracking and incident response.
          - Active member of Quality Assurance and AI Working Groups, driving innovation and engineering best practices.
          - Lead development of an internal collaborative CLI tool at SAP, featuring AI agents for development workflows and ticket analysis, connected to MCP servers, integrating Claude (Anthropic), Cline, and GitHub Copilot to boost team productivity.
          - Work in cross-functional Scrum teams with Continuous Delivery practices, authoring unit, integration, and performance tests.
          - **Champion of SAP InnoWeeks 2025**, winning 4 prizes including Best AI Implementation and Overall Winner.
      - role: Back-end Developer
        time: Oct 2021 - Oct 2024
        company: Verzel Soluções em Sistemas, Remote
        details: |
          - Designed and maintained scalable, resilient Java microservices using Spring Boot, applying SOLID principles, design patterns, and clean code practices.
          - Implemented unit and integration tests; contributed to application monitoring and observability (Zipkin).
          - Worked with Apache Kafka, Kafka Streams, KSQL, and Kafka Connect for real-time processing and data synchronization.
          - Experience with relational databases (PostgreSQL, Oracle, MySQL, SQL Server) and NoSQL (MongoDB).
          - Participated in Node.js projects using Express.js and Nest.js.
          - Collaborated in agile teams (Scrum, Kanban).
          - Extensive AWS experience (EC2, Lambda, S3, EKS, ECS, SQS, Cognito, Secrets Manager, CloudWatch), CI/CD pipelines (Terraform, CloudFormation, GitHub Actions, Docker, Kubernetes), and Azure DevOps.
      - role: SysAdmin
        time: Aug 2018 - Aug 2021
        company: Marinha do Brasil (Brazil's Navy), Florianópolis, SC
        details: |
          - Managed Data Center operations including creation and maintenance of physical and virtual servers (VMware, XenServer, FreeNAS).
          - Administered domain servers, DNS, Samba 4, and web applications (Drupal CMS).
          - Conducted backup routines, monitoring, and storage management.
          - Taught Basic Informatics classes for EAMSC students.
          - Technologies: Bacula, Zabbix, Apache, PostgreSQL, MySQL, Shell Script, Oracle Linux, Ubuntu, Suse Linux.
      - role: Systems Division Assistant
        time: Dec 2012 - Jan 2018
        company: Marinha do Brasil (Brazil's Navy), Niterói, RJ
        details: |
          - Managed Data Center operations: server creation and maintenance (on-premises), virtualization, backup, domain and DNS setup, and server monitoring.
          - Technologies: VMware ESX, FreeNAS, DNS Server, Samba 4, Drupal CMS, Bacula, Zabbix, PostgreSQL, MySQL, Shell Script, Suse Linux, Ubuntu.
      - role: Support Analyst I
        time: Feb 2012 - Jul 2012
        company: Santa Casa de Juiz de Fora, MG
        details: |
          - Supported billing systems for health plan clients, preparing requests in Oracle Database (PL/SQL).
          - Provided technical support to users and performed computer maintenance.

